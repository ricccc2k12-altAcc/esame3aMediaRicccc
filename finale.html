<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentazione - Riccardo Pichini</title>

    <style>
      body {
        margin: 0;
        height: 100vh;
        background-color: #f0f0f0;
      }

      table {
        border: 10px solid black;
        border-radius: 15px;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        
        width: 960px;
        height: 540px; 
        
        border-spacing: 108px 55px; 
        
        background-image: url("https://res.allmacwallpaper.com/get/MacBook-Air-13-inch-wallpapers/Minimalist-blue-1440x900/1686-4.jpg");
        background-size: cover;
        background-position: center;
        
        overflow: hidden;

	    isolation: isolate;
	    transform-style: flat;
	    backface-visibility: hidden;
      }

      td {
        width: 100px; 
        height: 100px;
        border: 1px solid rgb(255, 255, 255, 0);
        background-color: rgb(255, 255, 255, 0);
      }
			
      td p {
        margin: 0;
      }
			
      button {
        width: 100px; 
        height: 100px;
        background: linear-gradient(180deg, rgba(24, 63, 125, var(--op1, 0.5)) 0%, rgba(24, 63, 125, var(--op2, 0.8)) 100%);
        border: 0px solid white;
        border-radius: 15px;
        text-align: center;
        color: #dae4f5;
        font-size: 25px;
        font-family: "Helvetica Neue", Helvetica;
        /* Forza l'ancoraggio centrale per evitare disallineamenti asimmetrici */
        transform-origin: center center !important; 
        /* Transizione fluida impostata sulle proprietà geometriche e sui bordi per eliminare lo stretching del testo */
        transition: 
          width 0.8s cubic-bezier(0.25, 1, 0.5, 1),
          height 0.8s cubic-bezier(0.25, 1, 0.5, 1),
          top 0.8s cubic-bezier(0.25, 1, 0.5, 1),
          left 0.8s cubic-bezier(0.25, 1, 0.5, 1),
          opacity 0.6s ease, 
          border-radius 0.8s cubic-bezier(0.25, 1, 0.5, 1),
          transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
      }
			
      button:hover {
        background: linear-gradient(180deg, rgba(48, 126, 250, .5) 0%, rgba(24, 63, 125, .8) 100%);
        color: white;
        cursor: pointer;
      }
      
      button.espandi-pulsante:hover {
        background: linear-gradient(180deg, rgba(48, 126, 250, 1) 0%, rgba(24, 63, 125, 1) 100%);
        color: white;
        cursor: context-menu;
      }
			
      .nascondi-pulsante {
        transform: translateY(400px);
        opacity: 0;
        pointer-events: none;
      } 
      
      .espandi-pulsante {
        position: absolute;
        margin: 0;
        z-index: 10;
        color: white;
        cursor: context-menu;
      }
      
      img.img-slide{
        width: auto;
        max-height: 200px;
        margin: 0 90px;
      }
      
      button#schermata-blocco {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 960px;
        height: 540px;
		background-image: url();
        background-size: cover;
        background-position: center;
        border-radius: 5px;
        z-index: 999; 
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        cursor: pointer;
        border: none; /* Annulla il bordo standard dei button */
        margin: 0;
        transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.6s ease;
      }
      
      .sblocca-ipad {
        /* Mantiene la centratura orizzontale (-50%) ma lo spara in alto oltre il monitor (-100vh) */
        transform: translate(-50%, -540px) !important;
        opacity: 0;
        pointer-events: none;
        transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s ease !important;
      }
    </style>
  </head>
  <body>

    <table>
      <button id="schermata-blocco" onclick="sbloccaSchermo()">
        <p class="ipad-ora" id="ipadClock" style="font-size: 50px">12:00</p>
        <p class="ipad-data" id="ipadDate">Lunedì, 1 Giugno </p>
        <div class="ipad-sblocco" style="font-size: 15px">Clicca per sbloccare</div>
      </button>
      <tr>
        <td><button class="materia nascondi-pulsante" onclick="changeslide(this)">Tec</button></td>
        <td><button class="materia nascondi-pulsante" onclick="changeslide(this)">Sto</button></td>
        <td><button class="materia nascondi-pulsante" onclick="changeslide(this)">Geo</button></td>
        <td><button class="materia nascondi-pulsante" onclick="changeslide(this)">Ita</button></td>
      </tr>
      <tr>
        <td><button class="materia nascondi-pulsante" onclick="changeslide(this)">Eng</button></td>
        <td><button class="materia nascondi-pulsante" onclick="changeslide(this)">Esp</button></td>
        <td><button class="materia nascondi-pulsante" onclick="changeslide(this)">Sci</button></td>
        <td><button class="materia nascondi-pulsante" onclick="changeslide(this)">EdF</button></td>
      </tr>
      <tr>
        <td><button class="materia nascondi-pulsante" onclick="changeslide(this)">EdC</button></td>
        <td><button class="materia nascondi-pulsante" onclick="changeslide(this)">Rel</button></td>
        <td><button class="materia nascondi-pulsante" onclick="changeslide(this)">Mus</button></td>
        <td><button class="materia nascondi-pulsante" onclick="changeslide(this)">Art</button></td>
      </tr>
    </table>

<script>
  function aggiornaOrologio() {
    const oraElemento = document.getElementById('ipadClock'); 
    const dataElemento = document.getElementById('ipadDate'); 
    const adesso = new Date();

    // 1. Aggiorna l'orario (Ore:Minuti) al secondo corrente
    if (oraElemento) {
      const ore = String(adesso.getHours()).padStart(2, '0');
      const minuti = String(adesso.getMinutes()).padStart(2, '0');
      oraElemento.innerText = ore + ':' + minuti;
    }

    // 2. Aggiorna la data in tempo reale (es. "Lunedì, 1 giugno")
    if (dataElemento) {
      const opzioni = { weekday: 'long', day: 'numeric', month: 'long' };
      let dataFormattata = adesso.toLocaleDateString('it-IT', opzioni);

      // Converte la prima lettera del giorno in maiuscola (es. "lunedì" -> "Lunedì")
      dataFormattata = dataFormattata.charAt(0).toUpperCase() + dataFormattata.slice(1);
      dataElemento.innerText = dataFormattata;
    }
  }
  // Forza il timer a ricalcolare i dati ogni secondo (1000ms)
  setInterval(aggiornaOrologio, 1000);
  aggiornaOrologio();
  
  
  function changeslide(pulsanteCliccato) {
    const tabella = document.querySelector('table');
    const pulsantiMaterie = document.querySelectorAll(".materia");

    const rectTabella = tabella.getBoundingClientRect();
    const rectPulsante = pulsanteCliccato.getBoundingClientRect();

    // Rileva la posizione iniziale reale sulla griglia interna della tabella
	const attualeX = pulsanteCliccato.dataset.origX ? parseFloat(pulsanteCliccato.dataset.origX) : (rectPulsante.left - rectTabella.left - 10);
	const attualeY = pulsanteCliccato.dataset.origY ? parseFloat(pulsanteCliccato.dataset.origY) : (rectPulsante.top - rectTabella.top - 10);

    // Calcolo millimetrico per centrare il box dentro la cornice nera da 10px della tabella
    const finaleX = 0; 
    const finaleY = 0;
    const larghezzaFinale = 960 - 4;
    const altezzaFinale = 540 - 8;

    // --- GESTIONE CHIUSURA (Ritorno fluido reale senza stretching) ---
    if (pulsanteCliccato.classList.contains('espandi-pulsante')) {

      pulsanteCliccato.innerHTML = ''; 

      // Avvia il movimento di rimpicciolimento verso la cella originale
      pulsanteCliccato.style.left = attualeX + 'px';
      pulsanteCliccato.style.top = attualeY + 'px';
      pulsanteCliccato.style.width = '100px';
      pulsanteCliccato.style.height = '100px';
      pulsanteCliccato.style.borderRadius = '15px';
      
      pulsanteCliccato.style.setProperty('--op1', '0.5');
      pulsanteCliccato.style.setProperty('--op2', '0.8');
      
      pulsantiMaterie.forEach(bottone => {
        bottone.classList.remove('nascondi-pulsante');
      });

      setTimeout(() => {
        pulsanteCliccato.style.transition = 'none';
        
        pulsanteCliccato.classList.remove('espandi-pulsante');
        pulsanteCliccato.style.position = '';
        pulsanteCliccato.style.left = '';
        pulsanteCliccato.style.top = '';
        pulsanteCliccato.style.width = '';
        pulsanteCliccato.style.height = '';
        pulsanteCliccato.style.margin = '';
        pulsanteCliccato.style.borderRadius = '';

        // NUOVO: Ripristina la scritta originale (es. "Tec") solo ora che il tasto è tornato a 100x100px
        pulsanteCliccato.innerHTML = pulsanteCliccato.dataset.testoOriginale;

        setTimeout(() => {
          pulsanteCliccato.style.transition = '';
        }, 30);
      }, 800); // 800ms è la durata esatta della transizione

      return;
    }

    // --- GESTIONE APERTURA (Allargamento lineare simmetrico sui 4 lati) ---
    pulsanteCliccato.dataset.origX = attualeX;
    pulsanteCliccato.dataset.origY = attualeY;

    // Spegne la transizione per agganciare il tasto in modo assoluto stabile senza micro-movimenti diagonali
    pulsanteCliccato.style.transition = 'none';
    pulsanteCliccato.classList.add('espandi-pulsante');
    
    // Lo blocca sopra la sua cella nativa mantenendo la forma a quadrato
    pulsanteCliccato.style.left = attualeX + 'px';
    pulsanteCliccato.style.top = attualeY + 'px';
    pulsanteCliccato.style.width = '100px';
    pulsanteCliccato.style.height = '100px';
    pulsanteCliccato.style.borderRadius = '15px';
    pulsanteCliccato.style.setProperty('--op1', '0.5');
    pulsanteCliccato.style.setProperty('--op2', '0.8');

    // Riaccende l'easing ed esegue l'allargamento lineare dei pixel reali
    setTimeout(() => {
      pulsanteCliccato.style.transition = ''; 
      
      pulsantiMaterie.forEach(bottone => {
        if (bottone !== pulsanteCliccato) {
          bottone.classList.add('nascondi-pulsante');
        }
      });

      // Il box si allarga modificando larghezza e altezza: il testo a 25px rimane fisso e nitido
      pulsanteCliccato.style.left = finaleX + 'px';
      pulsanteCliccato.style.top = finaleY + 'px';
      pulsanteCliccato.style.width = larghezzaFinale + 'px';
      pulsanteCliccato.style.height = altezzaFinale + 'px';
      pulsanteCliccato.style.borderRadius = '5px'; // Raggio geometrico perfetto calcolato (15 - 10 = 5)
      pulsanteCliccato.style.setProperty('--op1', '1');
      pulsanteCliccato.style.setProperty('--op2', '1');
      // Salviamo il testo corto (es. "Tec") in una memoria del pulsante per non perderlo
      if (!pulsanteCliccato.dataset.testoOriginale) {
        pulsanteCliccato.dataset.testoOriginale = pulsanteCliccato.innerText;
      }

      let contenutoSlide = "";

      switch (pulsanteCliccato.dataset.testoOriginale) {
        case "Tec":
          contenutoSlide = `
            <h1 class="titolo-slide">TECNOLOGIA<br>I server</h1>
            <p class="testo-slide">•Computer particolari sui quali viene eseguito <u>tutto internet</u>, come noi eseguiamo un' app</p><br><br>
            <img class="img-slide" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ8oVutPXvX3pFT5dQf3DGp63zIi0IBHqqsCQ&s" alt="Tecnologia">
          `;
          break;

        case "Sto":
          contenutoSlide = `
            <h1 class="titolo-slide">STORIA</h1>
            <p class="testo-slide">•Dalle origini militari di <u>Arpanet</u> alla rivoluzione digitale di <u>Internet</u></p><br><br>
            <img class="img-slide" src="https://media.hswstatic.com/eyJidWNrZXQiOiJjb250ZW50Lmhzd3N0YXRpYy5jb20iLCJrZXkiOiJnaWZcL2FycGFuZXQtNS5qcGciLCJlZGl0cyI6eyJyZXNpemUiOnsid2lkdGgiOjI5MH19fQ==" alt="Storia">
          `;
          break;
          
        case "Geo":
          contenutoSlide = `
            <h1 class="titolo-slide">GEOGRAFIA<br>La Silicon Valley</h1>
            <p class="testo-slide">•Dove nascono le grandi <u>idee</u> che <u>cambiano il mondo</u></p><br><br>
            <img class="img-slide" src="https://platform.theverge.com/wp-content/uploads/sites/2/chorus/uploads/chorus_asset/file/2376290/DSCF9158.0.jpg" alt="Geografia">
          `;
          break;

        case "Ita":
          contenutoSlide = `
            <h1 class="titolo-slide">ITALIANO<br>Uno, Nessuno e centomila</h1>
            <p class="testo-slide">•"Imparerai a <u>tue spese</u> che nel lungo tragitto della vita incontrerai <u>tante maschere</u> e <u>pochi volti</u>" (<i>Uno, nessuno e centomila</i>)</p><br><br>
            <img class="img-slide" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSWZ33pUG4gmoIA2Asbp6Hj9Wi899aGyLUMQQ&s" alt="Italiano">
          `;
          break;

        case "Eng":
          contenutoSlide = `
            <h1 class="titolo-slide">INGLESE<br>The picture of Dorian Gray</h1>
            <p class="testo-slide">•<u>Our</u> aim to perfectioning ourselves, nowadays reflected in <u>our</u> social media profiles</p><br><br>
            <img class="img-slide" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSRBqLfHm2PH-psghP3qZ1ZqvgAfohkIQZ1988n6Pfhm--ADxSBa_OlQLk&s=10" alt="Inglese">
          `;
          break;

        case "Esp":
          contenutoSlide = `
            <h1 class="titolo-slide">SPAGNOLO<br>La tercera lengua en el Internet</h1>
            <p class="testo-slide">•En internet, aprender <u>español</u> abre la puerta a un <u>nuevo mundo</u></p><br><br>
            <img class="img-slide" src="https://masjerez.com/storage/noticias/August2020/DRUOy63tEvd2oBjuQ6xg.jpg" alt="Spagnolo">
          `;
          break;

        case "Sci":
          contenutoSlide = `
            <h1 class="titolo-slide">SCIENZE<br>La dipendenza da internet</h1>
            <p class="testo-slide">•Il sistema <u>nervoso</u>, la <u>dopamina</u> ed i <u>social</u> quasi come le droghe</p><br><br>
            <img class="img-slide" src="https://www.psicoterapiafunzionale.it/wp-content/uploads/2020/05/foto-articolo-giulia-1.jpg" alt="Scienze">
          `;
          break;

        case "EdF":
          contenutoSlide = `
            <h1 class="titolo-slide">EDUCAZIONE FISICA<br>Postura (non) corretta e text neck</h1>
            <p class="testo-slide">•Spesso, siamo così <u>attaccati ai social</u> che non pensiamo a come stare seduti <u>bene</u></p><br><br>
            <img class="img-slide" src="https://drcarmelogiuffrida.com/wp-content/uploads/2021/11/Immagine-a.jpg" alt="Educazione Fisica">
          `;
          break;

        case "EdC":
          contenutoSlide = `
            <h1 class="titolo-slide">EDUCAZIONE CIVICA<br>il GDPR</h1>
            <p class="testo-slide">•<u>General Data Protection Regulation</u>, uno <u>scudo</u> dai <u>pericoli</u> di Internet</p><br><br>
            <img class="img-slide" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTGaYnDiYWKLfKYdSpW7NvoBE3B09nafzXdEA&s" alt="Educazione Civica">
          `;
          break;

        case "Rel":
          contenutoSlide = `
            <h1 class="titolo-slide">RELIGIONE<br>Che ne pensa la Chiesa?</h1>
            <p class="testo-slide">•Il pensiero della CEI sull'uso dell'Internet, a braccetto col GDPR</p><br><br>
            <img class="img-slide" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRrdmQ0lyxfr6aECSiGAKW7joGzdiiRt_8Rng&s" alt="Religione">
          `;
          break;

        case "Mus":
          contenutoSlide = `
            <h1 class="titolo-slide">MUSICA<br>Digital Audio Workstation</h1>
            <p class="testo-slide">•<u>Cosa</u> sono, <u>perchè</u> sono utili e <u>cosa c'entra</u> con internet</p><br><br>
            <img class="img-slide" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTMICKr0XUlVt0-8DbkDfBnEie30BFKPOn0Pw&s" alt="Musica">
          `;
          break;

        case "Art":
          contenutoSlide = `
            <h1 class="titolo-slide">ARTE<br>Piet Mondrian ed i layout</h1>
            <p class="testo-slide">•I <u>layout</u> delle pagine web, comparati alle <u>composizioni</u> dell' artista</p><br><br>
            <img class="img-slide" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTG5L5ekcxIapS38xjvGhYHX0PTaxy_X6O8hA&s" alt="Arte">
            <img class="img-slide" src="https://i0.wp.com/www.cssscript.com/wp-content/uploads/2020/09/Animated-Skeleton-Loading-Screens-In-Pure-CSS.jpg?fit=741%2C523&ssl=1" alt="Arte">
          `;
          break;

        default:
          contenutoSlide = `<h1 class="titolo-slide">${pulsanteCliccato.dataset.testoOriginale}</h1>`;
      }

      pulsanteCliccato.innerHTML = contenutoSlide;

    }, 30);
  }
  
  function sbloccaSchermo() {
    const blocco = document.getElementById('schermata-blocco');
    const pulsantiMaterie = document.querySelectorAll(".materia");

    // 1. Fa scivolare giù il pulsantone della lockscreen
    blocco.classList.add('sblocca-ipad');

    // 2. Toglie la classe esistente: i 12 pulsanti risalgono fluidamente dal basso verso le loro celle
    pulsantiMaterie.forEach(bottone => {
      bottone.classList.remove('nascondi-pulsante');
    });

    // 3. Rimuove il pulsantone dopo 800ms per liberare l'interfaccia
    setTimeout(() => {
      blocco.remove();
    }, 800);
  }
</script>

  </body>
</html>
